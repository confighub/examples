# Persona: operator — platform/SRE operations access.
# Full workload lifecycle including delete, node and namespace visibility,
# but still no secrets write and no RBAC mutation.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rbac-manager-operator
  labels:
    rbac-manager.confighub.com/persona: operator
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - pods
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
      - jobs
      - cronjobs
      - configmaps
      - services
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec", "pods/portforward"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "events", "resourcequotas", "limitranges"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rbac-manager-operator
  labels:
    rbac-manager.confighub.com/persona: operator
subjects:
  - kind: Group
    name: oidc:platform-operators
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: rbac-manager-operator
  apiGroup: rbac.authorization.k8s.io
