# PLANTED VIOLATION: standing cluster-admin grant.
# Trips the no-cluster-admin-binding guardrail — the "5-15 unnecessary
# cluster-admin bindings per cluster" finding from the audit literature.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oncall-breakglass
  labels:
    rbac-manager.confighub.com/imported: "true"
subjects:
  - kind: Group
    name: oidc:oncall
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
