# PLANTED VIOLATION: orphaned binding.
# References a Role ("grafana-viewer") that does not exist anywhere in the
# fleet, and a subject (alice@example.com) bound nowhere else — the stale
# grant the audit findings should surface. No Trigger fires on this one;
# it is detected by the app's client-side analysis.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-viewers
  namespace: monitoring
  labels:
    rbac-manager.confighub.com/imported: "true"
subjects:
  - kind: User
    name: alice@example.com
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: grafana-viewer
  apiGroup: rbac.authorization.k8s.io
