# Long-lived demo deployment of the rbac-manager example, served at
# https://rbac-manager.test.confighub.net against the production ConfigHub API.
# Lives as the `rbac-manager` unit in the prod-use2-ui-preview space, which
# already provides the namespace, wildcard TLS cert, and Argo CD sync.
# The image tag is managed by .github/workflows/deploy-rbac-manager.yml.
apiVersion: v1
kind: Service
metadata:
  name: rbac-manager
  namespace: ui-preview
  labels:
    app: rbac-manager
  annotations:
    confighub.com/ResourceMergeID: e30eaec0-c6bd-4367-8565-978a8ceb6895
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
  selector:
    app: rbac-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-manager
  namespace: ui-preview
  labels:
    app: rbac-manager
  annotations:
    confighub.com/ResourceMergeID: c0b1aefc-a76d-42b4-9d39-3c79d483a03e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-manager
  template:
    metadata:
      labels:
        app: rbac-manager
        app.kubernetes.io/name: rbac-manager
    spec:
      containers:
      - name: rbac-manager
        # Public package — no imagePullSecrets needed.
        image: ghcr.io/confighub/rbac-manager:latest
        imagePullPolicy: Always
        env:
        - name: API_BACKEND_URL
          value: "http://confighub-api.confighub.svc.cluster.local:9090"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
        securityContext:
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          privileged: false
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rbac-manager
  namespace: ui-preview
  labels:
    app: rbac-manager
  annotations:
    confighub.com/ResourceMergeID: c411c6ec-6873-4c06-a006-a8f5c3ae0025
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rbac-manager-http
  namespace: ui-preview
  labels:
    app: rbac-manager
  annotations:
    confighub.com/ResourceMergeID: dd838037-9c98-4736-a0f8-70b7e2642a28
spec:
  entryPoints:
  - web
  routes:
  - match: Host(`rbac-manager.test.confighub.net`)
    kind: Rule
    middlewares:
    - name: rbac-manager
    services:
    - name: rbac-manager
      port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rbac-manager-https
  namespace: ui-preview
  labels:
    app: rbac-manager
  annotations:
    confighub.com/ResourceMergeID: 17bf9281-be5e-4d37-8988-b66881ea20ff
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`rbac-manager.test.confighub.net`)
    kind: Rule
    middlewares:
    - name: rbac-manager
    services:
    - name: rbac-manager
      port: 80
  tls:
    secretName: wildcard-test-confighub-net-tls
