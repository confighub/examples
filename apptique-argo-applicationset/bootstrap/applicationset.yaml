apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apptique
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/confighub/examples.git
        revision: main
        directories:
          - path: apptique-argo-applicationset/apps/apptique/*
  template:
    metadata:
      name: 'apptique-{{path.basename}}'
      labels:
        app.kubernetes.io/name: apptique
        app.kubernetes.io/instance: 'apptique-{{path.basename}}'
        environment: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/confighub/examples.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'apptique-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
