apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-management-app
  labels:
    app.kubernetes.io/name: cost-management-app
    app.kubernetes.io/part-of: generated-operational-apps
    confighub.com/component: cost-management-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cost-management-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cost-management-app
        confighub.com/component: cost-management-app
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/cost-management-app:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          env:
            - name: CONFIGHUB_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: cost-management-app-config
                  key: CONFIGHUB_BASE_URL
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cost-management-app-oauth
                  key: OAUTH_CLIENT_ID
          readinessProbe:
            httpGet:
              path: /
              port: http
