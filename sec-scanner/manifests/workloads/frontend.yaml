# Workload: frontend — public web tier. Pinned to a current nginx-alpine.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    sec-scanner.confighub.com/workload: frontend
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
