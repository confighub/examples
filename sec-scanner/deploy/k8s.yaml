# Reference deployment manifest for the sec-scanner console (a static SPA over
# the ConfigHub API). Unlike rbac-manager, this example ships no live hosted
# instance or CI workflow — this file is a template showing the same hosting
# shape: an nginx container serving the built bundle and proxying /api + /auth
# to ConfigHub, made same-origin so the session-cookie login works with no CORS.
#
# Adjust the namespace, hostname, and image to your environment before applying.
# The SPA needs ONLY the ConfigHub API: scan verdicts are already stored on the
# Units as annotations, so neither the CVE database nor the scanner is part of
# this deployment.
apiVersion: v1
kind: Service
metadata:
  name: sec-scanner
  namespace: ui-preview
  labels:
    app: sec-scanner
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
  selector:
    app: sec-scanner
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sec-scanner
  namespace: ui-preview
  labels:
    app: sec-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sec-scanner
  template:
    metadata:
      labels:
        app: sec-scanner
        app.kubernetes.io/name: sec-scanner
    spec:
      containers:
      - name: sec-scanner
        # Public package — no imagePullSecrets needed.
        image: ghcr.io/confighub/sec-scanner:latest
        imagePullPolicy: Always
        env:
        - name: API_BACKEND_URL
          value: "http://confighub-api.confighub.svc.cluster.local:9090"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 200m
        securityContext:
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          privileged: false
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sec-scanner
  namespace: ui-preview
  labels:
    app: sec-scanner
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sec-scanner-http
  namespace: ui-preview
  labels:
    app: sec-scanner
spec:
  entryPoints:
  - web
  routes:
  - match: Host(`sec-scanner.test.confighub.net`)
    kind: Rule
    middlewares:
    - name: sec-scanner
    services:
    - name: sec-scanner
      port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sec-scanner-https
  namespace: ui-preview
  labels:
    app: sec-scanner
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`sec-scanner.test.confighub.net`)
    kind: Rule
    middlewares:
    - name: sec-scanner
    services:
    - name: sec-scanner
      port: 80
  tls:
    secretName: wildcard-test-confighub-net-tls
