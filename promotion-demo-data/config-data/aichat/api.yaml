apiVersion: apps/v1
kind: Deployment
metadata:
  name: aichat-api
  namespace: confighubplaceholder
  labels:
    app: aichat-api
    component: api
    part-of: aichat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aichat-api
  template:
    metadata:
      labels:
        app: aichat-api
        component: api
        part-of: aichat
    spec:
      containers:
      - name: api
        image: ghcr.io/acme/aichat-api:1.4.2
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: confighubplaceholder
        - name: REGION
          value: confighubplaceholder
        - name: LOG_LEVEL
          value: debug
        - name: DATABASE_URL
          value: "postgresql://aichat:secret@aichat-postgres:5432/aichat"
        - name: REDIS_URL
          value: "redis://aichat-redis:6379/0"
        - name: LLM_PROVIDER
          value: "anthropic"
        - name: LLM_MODEL
          value: "claude-sonnet-4-5-20250929"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aichat-api
  namespace: confighubplaceholder
  labels:
    app: aichat-api
spec:
  selector:
    app: aichat-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aichat-api-ingress
  namespace: confighubplaceholder
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - confighubplaceholder
    secretName: aichat-api-tls
  rules:
  - host: confighubplaceholder
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: aichat-api
            port:
              number: 8000
