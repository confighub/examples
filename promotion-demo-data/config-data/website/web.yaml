apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-web
  namespace: confighubplaceholder
  labels:
    app: website-web
    component: web
    part-of: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website-web
  template:
    metadata:
      labels:
        app: website-web
        component: web
        part-of: website
    spec:
      containers:
      - name: web
        image: ghcr.io/acme/website-web:2.1.0
        ports:
        - containerPort: 3000
        env:
        - name: ENVIRONMENT
          value: confighubplaceholder
        - name: REGION
          value: confighubplaceholder
        - name: LOG_LEVEL
          value: debug
        - name: CMS_API_URL
          value: "http://website-cms:1337"
        - name: ANALYTICS_ID
          value: "UA-000000-1"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: website-web
  namespace: confighubplaceholder
  labels:
    app: website-web
spec:
  selector:
    app: website-web
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website-web-ingress
  namespace: confighubplaceholder
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - confighubplaceholder
    secretName: website-web-tls
  rules:
  - host: confighubplaceholder
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: website-web
            port:
              number: 3000
