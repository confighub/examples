apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-cms
  namespace: confighubplaceholder
  labels:
    app: website-cms
    component: cms
    part-of: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website-cms
  template:
    metadata:
      labels:
        app: website-cms
        component: cms
        part-of: website
    spec:
      containers:
      - name: cms
        image: ghcr.io/acme/website-cms:1.3.0
        ports:
        - containerPort: 1337
        env:
        - name: ENVIRONMENT
          value: confighubplaceholder
        - name: REGION
          value: confighubplaceholder
        - name: LOG_LEVEL
          value: debug
        - name: DATABASE_URL
          value: "postgresql://website:secret@website-postgres:5432/website_cms"
        - name: ADMIN_JWT_SECRET
          value: confighubplaceholder
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /_health
            port: 1337
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: website-cms
  namespace: confighubplaceholder
  labels:
    app: website-cms
spec:
  selector:
    app: website-cms
  ports:
  - name: http
    port: 1337
    targetPort: 1337
  type: ClusterIP
