apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshop-frontend
  namespace: confighubplaceholder
  labels:
    app: eshop-frontend
    component: frontend
    part-of: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eshop-frontend
  template:
    metadata:
      labels:
        app: eshop-frontend
        component: frontend
        part-of: eshop
    spec:
      containers:
      - name: frontend
        image: ghcr.io/acme/eshop-frontend:4.2.1
        ports:
        - containerPort: 3000
        env:
        - name: ENVIRONMENT
          value: confighubplaceholder
        - name: REGION
          value: confighubplaceholder
        - name: API_URL
          value: "http://eshop-api:8080"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: eshop-frontend
  namespace: confighubplaceholder
  labels:
    app: eshop-frontend
spec:
  selector:
    app: eshop-frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-frontend-ingress
  namespace: confighubplaceholder
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - confighubplaceholder
    secretName: eshop-frontend-tls
  rules:
  - host: confighubplaceholder
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eshop-frontend
            port:
              number: 3000
