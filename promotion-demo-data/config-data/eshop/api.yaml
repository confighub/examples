apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshop-api
  namespace: confighubplaceholder
  labels:
    app: eshop-api
    component: api
    part-of: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eshop-api
  template:
    metadata:
      labels:
        app: eshop-api
        component: api
        part-of: eshop
    spec:
      containers:
      - name: api
        image: ghcr.io/acme/eshop-api:4.2.1
        ports:
        - containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: confighubplaceholder
        - name: REGION
          value: confighubplaceholder
        - name: LOG_LEVEL
          value: debug
        - name: DATABASE_URL
          value: "postgresql://eshop:secret@eshop-postgres:5432/eshop"
        - name: REDIS_URL
          value: "redis://eshop-redis:6379/0"
        - name: STRIPE_API_KEY
          value: confighubplaceholder
        - name: CURRENCY
          value: "USD"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eshop-api
  namespace: confighubplaceholder
  labels:
    app: eshop-api
spec:
  selector:
    app: eshop-api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-api-ingress
  namespace: confighubplaceholder
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - confighubplaceholder
    secretName: eshop-api-tls
  rules:
  - host: confighubplaceholder
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: eshop-api
            port:
              number: 8080
