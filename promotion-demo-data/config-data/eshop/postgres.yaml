apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: eshop-postgres
  namespace: confighubplaceholder
  labels:
    app: eshop-postgres
    component: database
    part-of: eshop
spec:
  serviceName: eshop-postgres
  replicas: 1
  selector:
    matchLabels:
      app: eshop-postgres
  template:
    metadata:
      labels:
        app: eshop-postgres
        component: database
        part-of: eshop
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: eshop
        - name: POSTGRES_USER
          value: eshop
        - name: POSTGRES_PASSWORD
          value: confighubplaceholder
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: eshop-postgres
  namespace: confighubplaceholder
  labels:
    app: eshop-postgres
spec:
  selector:
    app: eshop-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
