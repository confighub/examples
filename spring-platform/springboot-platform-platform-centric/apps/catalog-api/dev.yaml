apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-api-config
  namespace: apps
data:
  application.yaml: |
    spring:
      application:
        name: catalog-api
      datasource:
        url: jdbc:postgresql://postgres.platform.svc:5432/catalog
        username: catalog
    catalog:
      environment: dev
    management:
      endpoints:
        web:
          exposure:
            include: health,info
    feature:
      catalog:
        searchEnabled: true
        recommendationsEnabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: apps
  labels:
    app.kubernetes.io/name: catalog-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-api
    spec:
      serviceAccountName: catalog-api
      containers:
        - name: catalog-api
          image: ghcr.io/example/catalog-api:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /config/
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres.platform.svc:5432/catalog
          volumeMounts:
            - name: app-config
              mountPath: /config
      volumes:
        - name: app-config
          configMap:
            name: catalog-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: catalog-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
