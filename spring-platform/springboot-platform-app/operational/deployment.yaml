apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: apps
  labels:
    app.kubernetes.io/name: inventory-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-api
    spec:
      serviceAccountName: inventory-api
      containers:
        - name: inventory-api
          image: ghcr.io/example/inventory-api:1.0.0
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: /config/
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres.platform.svc:5432/inventory
            - name: CACHE_BACKEND
              value: none
          volumeMounts:
            - name: app-config
              mountPath: /config
      volumes:
        - name: app-config
          configMap:
            name: inventory-api-config
