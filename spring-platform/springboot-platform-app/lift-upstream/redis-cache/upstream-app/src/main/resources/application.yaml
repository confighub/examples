spring:
  application:
    name: inventory-api
  datasource:
    url: jdbc:postgresql://postgres.platform.svc:5432/inventory
    username: inventory
  cache:
    type: redis
inventory:
  environment: dev
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info
feature:
  inventory:
    reservationMode: optimistic
