apiVersion: platform.confighub.io/v1alpha1
kind: Platform
metadata:
  name: springboot-platform
  labels:
    example: springboot-platform-app
spec:
  description: |
    Heroku-like Spring Boot platform providing managed datasource,
    runtime hardening, and observability defaults. App teams get
    batteries-included deployment with clear boundaries.

  # What the platform provides to apps
  provides:
    - name: managed-datasource
      type: postgres-shared
      description: Managed PostgreSQL with HA, encryption, and automated backups
      fieldPattern: spring.datasource.*
      guarantees:
        - high-availability
        - encryption-at-rest
        - automated-backups
        - connection-pooling

    - name: runtime-hardening
      description: Security defaults for production workloads
      fieldPattern: securityContext.*
      requires:
        - runAsNonRoot: true
        - requireMtlsSidecar: true

    - name: observability
      description: Health endpoints and SLO targets
      requires:
        - actuatorHealth: /actuator/health
      slo:
        availability: "99.9%"
        p95LatencyMs: 250

  # Field ownership and mutation rules
  # This consolidates what was in field-routes.yaml
  fieldRoutes:
    - match: feature.inventory.*
      owner: app-team
      action: mutable-in-ch
      reason: Per-deployment rollout tuning is app-team safe
      example: feature.inventory.reservationMode=optimistic

    - match: spring.cache.*
      owner: app-team
      action: lift-upstream
      reason: Cache adoption changes the app contract and requires upstream code changes
      example: Adding Redis caching needs pom.xml and application.yaml changes

    - match: spring.datasource.*
      owner: platform-engineering
      action: generator-owned
      provides: managed-datasource
      reason: Datasource connectivity is managed by platform for HA and security
      blocked: true

    - match: securityContext.*
      owner: platform-engineering
      action: generator-owned
      provides: runtime-hardening
      reason: Runtime hardening must remain platform-controlled
      blocked: true

  # Contact information for escalations
  contacts:
    platform-engineering:
      slack: "#platform-support"
      email: platform@example.com
      escalation: "For blocked field changes, open a ticket in JIRA"
