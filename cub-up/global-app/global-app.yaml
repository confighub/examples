apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: global-app
  template:
    metadata:
      labels:
        app: global-app
    spec:
      containers:
        - name: global-app
          image: ghcr.io/confighubai/cubbychat/simple:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: global-app
  namespace: default
spec:
  selector:
    app: global-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
