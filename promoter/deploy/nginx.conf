pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # The SPA only ever talks to relative /api and /auth paths. Proxying
        # them to the ConfigHub API makes the deployment same-origin, so the
        # standard session-cookie login works with no OAuth setup in the app.
        # The Host header must be hub.confighub.com so the OAuth redirect_uri
        # checks pass; proxy_cookie_domain rewrites the session cookie so the
        # browser accepts it on this host.
        location /api/ {
            proxy_pass ${API_BACKEND_URL};
            proxy_set_header Host hub.confighub.com;
            proxy_cookie_domain hub.confighub.com $host;
        }

        location /auth/ {
            proxy_pass ${API_BACKEND_URL};
            proxy_set_header Host hub.confighub.com;
            proxy_cookie_domain hub.confighub.com $host;
        }

        # Hashed assets — cache aggressively
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML and SPA fallback — never serve stale
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
}
