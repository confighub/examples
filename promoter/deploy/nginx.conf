pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;

        # Static SPA only. The app talks browser-direct to the ConfigHub instance
        # (baked in at build time via VITE_CONFIGHUB_BASE_URL) and authenticates
        # with @confighub/react-auth's OIDC PKCE flow, so there is no API/auth
        # proxy here — nginx just serves the bundle.

        # Hashed assets — cache aggressively
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML and SPA fallback — never serve stale
        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
}
