apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: shop
spec:
  replicas: 3
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/example/checkout-migrate:1.4.2
      containers:
        - name: checkout
          image: ghcr.io/example/checkout:1.4.2
          command: ["/bin/checkout"]
          args: ["--serve"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: info
            - name: FEATURE_FLAGS
              valueFrom:
                configMapKeyRef:
                  name: checkout-config
                  key: flags
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: checkout-db
                  key: password
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: checkout-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/checkout
            - name: cache
              mountPath: /var/cache
      volumes:
        - name: config
          configMap:
            name: checkout-config
        - name: cache
          emptyDir: {}
