apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: add-on-manager-default
  labels:
    app.kubernetes.io/name: add-on-manager
    confighub.com/component: add-on-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: add-on-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 5173
  egress:
    - {}
