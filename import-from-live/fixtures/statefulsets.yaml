---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: myapp-prod
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: redis-18.6.1
    app.kubernetes.io/instance: redis
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
