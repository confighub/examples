apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payment-dev

resources:
  - ../../base

labels:
  - pairs:
      environment: dev

patches:
  - target:
      kind: Deployment
      name: payment-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
