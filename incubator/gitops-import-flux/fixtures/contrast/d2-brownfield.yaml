# D2 Brownfield Fixtures — Control Plane Flux Reference Architecture
#
# Based on examples/d2-control-plane/control-plane.yaml but applied via kubectl
# (not reconciled by Flux). This is the Flux equivalent of "Arnie" in the ArgoCD
# demo: resources with correct Flux ownership labels, but Flux didn't create them.
#
# Common in brownfield clusters where teams add Flux labels to existing resources
# before fully migrating to GitOps.
#
# Layers:
#   Infrastructure: cert-manager, monitoring (HelmRelease-managed)
#   Applications:   payment-api, frontend (Kustomization-managed)
#   Helm-only:      redis (no Flux labels, just Helm)
#   Native:         debug-config (no labels at all)

---
# === FLUX CRDs (Kustomizations + HelmReleases) ===
# These CRs exist but won't reconcile (source repo is fictional)

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform-config
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/acme/platform-config
  ref:
    branch: main

---
# Infrastructure Kustomization (platform team)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 5m
  path: ./infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-config

---
# Apps Kustomization (dev teams, depends on infrastructure)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-config
  dependsOn:
    - name: infrastructure

---
# Per-app Kustomizations (deployed by apps Kustomization)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: payment-api
  namespace: flux-system
  labels:
    kustomize.toolkit.fluxcd.io/name: apps
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  interval: 5m
  path: ./apps/payment-api/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-config
  targetNamespace: payments

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: frontend
  namespace: flux-system
  labels:
    kustomize.toolkit.fluxcd.io/name: apps
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  interval: 5m
  path: ./apps/frontend/overlays/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-config
  targetNamespace: store

---
# === INFRASTRUCTURE LAYER (Helm-via-Flux) ===
# Namespaces first, then HelmReleases, then Deployments

---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    kustomize.toolkit.fluxcd.io/name: infrastructure
    kustomize.toolkit.fluxcd.io/namespace: flux-system

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    kustomize.toolkit.fluxcd.io/name: infrastructure
    kustomize.toolkit.fluxcd.io/namespace: flux-system

---
# HelmReleases (deployed by infrastructure Kustomization)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    kustomize.toolkit.fluxcd.io/name: infrastructure
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: cert-manager
      version: "1.14.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
  labels:
    kustomize.toolkit.fluxcd.io/name: infrastructure
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "56.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: cert-manager
    helm.toolkit.fluxcd.io/name: cert-manager
    helm.toolkit.fluxcd.io/namespace: cert-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-manager
    spec:
      containers:
        - name: cert-manager
          image: quay.io/jetstack/cert-manager-controller:v1.14.4
          ports:
            - containerPort: 9402

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: prometheus
    helm.toolkit.fluxcd.io/name: monitoring
    helm.toolkit.fluxcd.io/namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grafana
    helm.toolkit.fluxcd.io/name: monitoring
    helm.toolkit.fluxcd.io/namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.1
          ports:
            - containerPort: 3000

---
# === APPLICATION LAYER (Kustomization-managed) ===

---
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    kustomize.toolkit.fluxcd.io/name: apps
    kustomize.toolkit.fluxcd.io/namespace: flux-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: payments
  labels:
    app: payment-api
    kustomize.toolkit.fluxcd.io/name: payment-api
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: api
          image: nginx:alpine
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: payments
  labels:
    app: payment-api
    kustomize.toolkit.fluxcd.io/name: payment-api
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  selector:
    app: payment-api
  ports:
    - port: 80
      targetPort: 8080

---
apiVersion: v1
kind: Namespace
metadata:
  name: store
  labels:
    kustomize.toolkit.fluxcd.io/name: apps
    kustomize.toolkit.fluxcd.io/namespace: flux-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: store
  labels:
    app: frontend
    kustomize.toolkit.fluxcd.io/name: frontend
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:alpine
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: store
  labels:
    app: frontend
    kustomize.toolkit.fluxcd.io/name: frontend
    kustomize.toolkit.fluxcd.io/namespace: flux-system
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000

---
# === HELM-ONLY (no Flux labels) ===
# Redis is managed by Helm directly, not through Flux.
# Only cub-scout import sees this.

---
apiVersion: v1
kind: Namespace
metadata:
  name: cache

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: cache
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: redis-cache
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
# === NATIVE (no labels at all) ===
# Only cub-scout import sees this.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debug-config
  namespace: store
data:
  debug-enabled: "true"
  log-level: "debug"
  feature-flags: "new-checkout=true,dark-mode=false"
