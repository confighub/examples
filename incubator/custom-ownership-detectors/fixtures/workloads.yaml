apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: detectors-demo
  labels:
    app.kubernetes.io/name: payments-api
    platform.company.com/managed-by: platform-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
        platform.company.com/managed-by: platform-controller
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-ui
  namespace: detectors-demo
  labels:
    app.kubernetes.io/name: infra-ui
  annotations:
    pulumi.com/stack: platform/prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infra-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infra-ui
      annotations:
        pulumi.com/stack: platform/prod
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-tool
  namespace: detectors-demo
  labels:
    app.kubernetes.io/name: debug-tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: debug-tool
  template:
    metadata:
      labels:
        app.kubernetes.io/name: debug-tool
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
