---
apiVersion: v1
kind: Namespace
metadata:
  name: mini-large-crds
  labels:
    mini-kubara: case-02
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-crd-controller
  namespace: mini-large-crds
  labels:
    app: mini-crd-controller
    mini-kubara: case-02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-crd-controller
  template:
    metadata:
      labels:
        app: mini-crd-controller
        mini-kubara: case-02
    spec:
      containers:
        - name: controller
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
