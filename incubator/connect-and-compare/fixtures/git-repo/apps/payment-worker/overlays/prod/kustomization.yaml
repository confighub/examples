apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payment-prod

resources:
  - ../../base

labels:
  - pairs:
      environment: prod

patches:
  - target:
      kind: Deployment
      name: payment-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
