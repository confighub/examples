apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: apptique
    component: frontend
    environment: prod
    app.kubernetes.io/instance: apptique-prod
    argocd.argoproj.io/instance: apptique-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apptique
      component: frontend
  template:
    metadata:
      labels:
        app: apptique
        component: frontend
        environment: prod
    spec:
      serviceAccountName: frontend
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: server
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
          readinessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /
              port: 80
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /
              port: 80
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: apptique
    component: frontend
    environment: prod
spec:
  type: ClusterIP
  selector:
    app: apptique
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  labels:
    app: apptique
    component: frontend
    environment: prod
