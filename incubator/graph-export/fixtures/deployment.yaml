apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-app
  namespace: graph-demo
  labels:
    app.kubernetes.io/name: graph-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: graph-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph-app
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
