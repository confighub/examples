apiVersion: v1
kind: Namespace
metadata:
  name: watch-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watch-demo
  namespace: watch-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watch-demo
  template:
    metadata:
      labels:
        app: watch-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: watch-demo
  namespace: watch-demo
spec:
  selector:
    app: watch-demo
  ports:
  - port: 80
    targetPort: 80
