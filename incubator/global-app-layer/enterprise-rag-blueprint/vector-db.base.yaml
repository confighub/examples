apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-db
  namespace: confighubplaceholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-db
  template:
    metadata:
      labels:
        app: vector-db
    spec:
      containers:
      - name: vector-db
        # Stub image for local/kind testing.
        # STACK=ollama or nim: replace with qdrant/qdrant:<tag> or milvusdb/milvus:<tag>.
        image: busybox:1.37
        command: ["sleep", "infinity"]
        ports:
        - containerPort: 6333
        env:
        - name: STACK
          value: stub
        - name: STORAGE_CLASS
          value: standard
        - name: STORAGE_SIZE
          value: "1Gi"
        - name: ACCELERATOR
          value: generic
        - name: MODEL_PROFILE
          value: generic
        - name: EMBED_DIM
          value: "0"
        - name: INDEX_TYPE
          value: baseline
        - name: METRIC
          value: cosine
        - name: COLLECTION_PREFIX
          value: general
        - name: TENANT
          value: unset
        - name: CLUSTER
          value: unset
        resources:
          requests:
            memory: "128Mi"
          limits:
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: vector-db
  namespace: confighubplaceholder
spec:
  selector:
    app: vector-db
  ports:
  - protocol: TCP
    port: 6333
    targetPort: 6333
  type: ClusterIP
