apiVersion: confighub.com/v1alpha1
kind: Recipe
metadata:
  name: confighubplaceholder-chain-name
  labels:
    example: confighubplaceholder-example-name
    chain: confighubplaceholder-chain-prefix
spec:
  component: backend
  pattern: ordered-clone-chain
  description: One materialized global-app chain showing clone = variant, link = upgrade path, bundle = published deployment artifact.
  layers:
    - name: base
      space: confighubplaceholder-base-space
      unit: confighubplaceholder-base-unit
      revision: confighubplaceholder-base-revision
      dataHash: confighubplaceholder-base-hash
      mutationDelta: original global-app backend manifest
    - name: region
      space: confighubplaceholder-region-space
      unit: confighubplaceholder-region-unit
      revision: confighubplaceholder-region-revision
      dataHash: confighubplaceholder-region-hash
      mutationDelta: set REGION=US and host=backend.us.demo.confighub.local
    - name: role
      space: confighubplaceholder-role-space
      unit: confighubplaceholder-role-unit
      revision: confighubplaceholder-role-revision
      dataHash: confighubplaceholder-role-hash
      mutationDelta: set ROLE=staging, replicas=2, LOG_LEVEL=info
    - name: recipe
      space: confighubplaceholder-recipe-space
      unit: confighubplaceholder-recipe-unit
      revision: confighubplaceholder-recipe-revision
      dataHash: confighubplaceholder-recipe-hash
      mutationDelta: set CHAT_TITLE to recipe-specific value
  deploymentVariants:
    - name: direct
      space: confighubplaceholder-deploy-space
      unit: confighubplaceholder-deploy-unit
      revision: confighubplaceholder-deploy-revision
      dataHash: confighubplaceholder-deploy-hash
      mutationDelta: set namespace=cluster-a, CLUSTER env var, and deployment host
      providerType: Kubernetes
      targetRef: confighubplaceholder-direct-target-ref
      bundleHint: confighubplaceholder-direct-bundle-hint
    - name: flux
      space: confighubplaceholder-flux-deploy-space
      unit: confighubplaceholder-flux-deploy-unit
      revision: confighubplaceholder-flux-deploy-revision
      dataHash: confighubplaceholder-flux-deploy-hash
      mutationDelta: set namespace=cluster-a, CLUSTER env var, and deployment host
      providerType: FluxOCI
      targetRef: confighubplaceholder-flux-target-ref
      bundleHint: confighubplaceholder-flux-bundle-hint
    - name: argo
      space: confighubplaceholder-argo-deploy-space
      unit: confighubplaceholder-argo-deploy-unit
      revision: confighubplaceholder-argo-deploy-revision
      dataHash: confighubplaceholder-argo-deploy-hash
      mutationDelta: set namespace=cluster-a, CLUSTER env var, and deployment host
      providerType: ArgoCDOCI
      targetRef: confighubplaceholder-argo-target-ref
      bundleHint: confighubplaceholder-argo-bundle-hint
  note: The bundle is the deployable output of each deployment variant's target. The recipe unit (above) is the shared app-level intent.
