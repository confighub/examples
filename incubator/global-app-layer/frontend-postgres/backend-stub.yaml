# Stub backend so frontend's nginx upstream resolves.
# This is not part of the layered chain — it provides the dependency
# that frontend needs (nginx proxies to backend:8080).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: confighubplaceholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:1.27-alpine
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: confighubplaceholder
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
