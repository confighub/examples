apiVersion: confighub.com/v1alpha1
kind: Recipe
metadata:
  name: confighubplaceholder-chain-name
  labels:
    example: confighubplaceholder-example-name
    chain: confighubplaceholder-chain-prefix
spec:
  app: confighubplaceholder-app-name
  pattern: ordered-clone-chain
  description: Two-component GPU recipe showing platform, accelerator, OS, and intent as shared ConfigHub layers.
  dimensions:
    platform: eks
    accelerator: h100
    os: ubuntu
    intent: training
  constraints:
    kubernetes: ">=1.29"
    runtimeClass: nvidia
    storageClass: gp3
  components:
    - name: gpu-operator
      layers:
        - name: base
          space: confighubplaceholder-gpu-operator-base-space
          unit: confighubplaceholder-gpu-operator-base-unit
          revision: confighubplaceholder-gpu-operator-base-revision
          dataHash: confighubplaceholder-gpu-operator-base-hash
          mutationDelta: original gpu-operator manifest with generic defaults
        - name: platform
          space: confighubplaceholder-gpu-operator-platform-space
          unit: confighubplaceholder-gpu-operator-platform-unit
          revision: confighubplaceholder-gpu-operator-platform-revision
          dataHash: confighubplaceholder-gpu-operator-platform-hash
          mutationDelta: set CLOUD_PROVIDER=eks and STORAGE_CLASS=gp3
        - name: accelerator
          space: confighubplaceholder-gpu-operator-accelerator-space
          unit: confighubplaceholder-gpu-operator-accelerator-unit
          revision: confighubplaceholder-gpu-operator-accelerator-revision
          dataHash: confighubplaceholder-gpu-operator-accelerator-hash
          mutationDelta: set ACCELERATOR=h100 and NODE_SELECTOR=nvidia-h100
        - name: os
          space: confighubplaceholder-gpu-operator-os-space
          unit: confighubplaceholder-gpu-operator-os-unit
          revision: confighubplaceholder-gpu-operator-os-revision
          dataHash: confighubplaceholder-gpu-operator-os-hash
          mutationDelta: set OS_FAMILY=ubuntu and DRIVER_BRANCH=550-ubuntu22.04
        - name: recipe
          space: confighubplaceholder-gpu-operator-recipe-space
          unit: confighubplaceholder-gpu-operator-recipe-unit
          revision: confighubplaceholder-gpu-operator-recipe-revision
          dataHash: confighubplaceholder-gpu-operator-recipe-hash
          mutationDelta: set WORKLOAD_INTENT=training and VALIDATION_PROFILE=training-smoke
      deploymentVariants:
        - name: direct
          space: confighubplaceholder-gpu-operator-deployment-direct-space
          unit: confighubplaceholder-gpu-operator-deployment-direct-unit
          revision: confighubplaceholder-gpu-operator-deployment-direct-revision
          dataHash: confighubplaceholder-gpu-operator-deployment-direct-hash
          mutationDelta: set namespace=cluster-a and CLUSTER=cluster-a for direct worker delivery
        - name: flux
          space: confighubplaceholder-gpu-operator-deployment-flux-space
          unit: confighubplaceholder-gpu-operator-deployment-flux-unit
          revision: confighubplaceholder-gpu-operator-deployment-flux-revision
          dataHash: confighubplaceholder-gpu-operator-deployment-flux-hash
          mutationDelta: set namespace=cluster-a and CLUSTER=cluster-a for Flux OCI delivery
    - name: nvidia-device-plugin
      layers:
        - name: base
          space: confighubplaceholder-nvidia-device-plugin-base-space
          unit: confighubplaceholder-nvidia-device-plugin-base-unit
          revision: confighubplaceholder-nvidia-device-plugin-base-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-base-hash
          mutationDelta: original nvidia-device-plugin manifest with generic defaults
        - name: platform
          space: confighubplaceholder-nvidia-device-plugin-platform-space
          unit: confighubplaceholder-nvidia-device-plugin-platform-unit
          revision: confighubplaceholder-nvidia-device-plugin-platform-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-platform-hash
          mutationDelta: set CLOUD_PROVIDER=eks and PLUGIN_CONFIG=eks-gp3
        - name: accelerator
          space: confighubplaceholder-nvidia-device-plugin-accelerator-space
          unit: confighubplaceholder-nvidia-device-plugin-accelerator-unit
          revision: confighubplaceholder-nvidia-device-plugin-accelerator-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-accelerator-hash
          mutationDelta: set ACCELERATOR=h100 and NODE_SELECTOR=nvidia-h100
        - name: os
          space: confighubplaceholder-nvidia-device-plugin-os-space
          unit: confighubplaceholder-nvidia-device-plugin-os-unit
          revision: confighubplaceholder-nvidia-device-plugin-os-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-os-hash
          mutationDelta: set OS_FAMILY=ubuntu and PLUGIN_CONFIG=ubuntu-h100
        - name: recipe
          space: confighubplaceholder-nvidia-device-plugin-recipe-space
          unit: confighubplaceholder-nvidia-device-plugin-recipe-unit
          revision: confighubplaceholder-nvidia-device-plugin-recipe-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-recipe-hash
          mutationDelta: set WORKLOAD_INTENT=training and PLUGIN_CONFIG=training-smoke
      deploymentVariants:
        - name: direct
          space: confighubplaceholder-nvidia-device-plugin-deployment-direct-space
          unit: confighubplaceholder-nvidia-device-plugin-deployment-direct-unit
          revision: confighubplaceholder-nvidia-device-plugin-deployment-direct-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-deployment-direct-hash
          mutationDelta: set namespace=cluster-a and CLUSTER=cluster-a for direct worker delivery
        - name: flux
          space: confighubplaceholder-nvidia-device-plugin-deployment-flux-space
          unit: confighubplaceholder-nvidia-device-plugin-deployment-flux-unit
          revision: confighubplaceholder-nvidia-device-plugin-deployment-flux-revision
          dataHash: confighubplaceholder-nvidia-device-plugin-deployment-flux-hash
          mutationDelta: set namespace=cluster-a and CLUSTER=cluster-a for Flux OCI delivery
  publish:
    variants:
      - name: direct
        targetRef: confighubplaceholder-direct-target-ref
        bundleHint: confighubplaceholder-direct-bundle-hint
        note: The bundle is the deployable output of the direct deployment units' target, not the source of truth for the layer chain.
      - name: flux
        targetRef: confighubplaceholder-flux-target-ref
        bundleHint: confighubplaceholder-flux-bundle-hint
        note: The bundle is the deployable output of the Flux deployment units' target, not the source of truth for the layer chain.
