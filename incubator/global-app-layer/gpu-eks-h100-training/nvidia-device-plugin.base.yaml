apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: confighubplaceholder
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      containers:
      - name: nvidia-device-plugin
        # Stub image for local/kind testing.
        # Replace with nvcr.io/nvidia/k8s-device-plugin:<tag> on real GPU clusters.
        image: busybox:1.37
        command: ["sleep", "infinity"]
        env:
        - name: CLOUD_PROVIDER
          value: generic
        - name: ACCELERATOR
          value: generic
        - name: NODE_SELECTOR
          value: generic
        - name: OS_FAMILY
          value: generic
        - name: PLUGIN_CONFIG
          value: baseline
        - name: WORKLOAD_INTENT
          value: general
        - name: CLUSTER
          value: unset
        resources:
          requests:
            memory: "64Mi"
          limits:
            memory: "128Mi"
