# Workload: api — application tier. Three replicas, moderate requests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    cost-estimator.confighub.com/workload: api
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/acme/api:1.8.2
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
