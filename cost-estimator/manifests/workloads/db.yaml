# Workload: db — stateful Postgres. One replica + a 20Gi persistent volume, so
# the estimate exercises the storage cost dimension (volumeClaimTemplates).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  labels:
    cost-estimator.confighub.com/workload: db
    app.kubernetes.io/component: database
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
